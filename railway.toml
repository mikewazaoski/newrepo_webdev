# Railway deployment config — https://docs.railway.app/reference/config-as-code
# Set env vars in the Railway dashboard (DATABASE_URL, APP_SECRET, etc.)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# App liveness only (no DB). Check MySQL at /api/mobile/health after deploy.
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Railway sets PORT automatically; entrypoint listens on ${PORT} (container nginx on port 80 by default)
