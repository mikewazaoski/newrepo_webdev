services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pet-pantry-app:latest
    restart: unless-stopped
    ports:
      # Port 80 only works after XAMPP Apache is stopped — run FIX-LOCALHOST-LOGIN.ps1 as Admin
      - "${HTTP_PORT:-80}:8080"
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET:-pet_pantry_docker_change_this_secret_32chars}
      DATABASE_URL: mysql://pets_user:pets_password@mysql:3306/pets_db?serverVersion=8.0&charset=utf8mb4
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost}
      TRUSTED_PROXIES: REMOTE_ADDR
      PORT: "8080"
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
      MAILER_DSN: null://null
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pets_network
    volumes:
      - uploads_data:/app/public/uploads

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: pets_root_password
      MYSQL_DATABASE: pets_db
      MYSQL_USER: pets_user
      MYSQL_PASSWORD: pets_password
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pets_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppets_root_password"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: pets_user
      PMA_PASSWORD: pets_password
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pets_network

volumes:
  mysql_data:
  uploads_data:

networks:
  pets_network:
