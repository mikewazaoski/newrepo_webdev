; Pass Railway/container environment variables into PHP-FPM workers.
; Values are taken from the container environment when php-fpm starts (see entrypoint.sh eval).
[www]
clear_env = no
env[APP_ENV] = $APP_ENV
env[APP_DEBUG] = $APP_DEBUG
env[APP_SECRET] = $APP_SECRET
env[TRUSTED_PROXIES] = $TRUSTED_PROXIES
env[DEFAULT_URI] = $DEFAULT_URI
env[DATABASE_URL] = $DATABASE_URL
env[MESSENGER_TRANSPORT_DSN] = $MESSENGER_TRANSPORT_DSN
env[MAILER_DSN] = $MAILER_DSN
env[CORS_ALLOW_ORIGIN] = $CORS_ALLOW_ORIGIN
env[GOOGLE_CLIENT_ID] = $GOOGLE_CLIENT_ID
env[GOOGLE_CLIENT_SECRET] = $GOOGLE_CLIENT_SECRET
