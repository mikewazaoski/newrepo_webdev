# XAMPP: proxy http://localhost to the Docker app on port 8080
# 1. In XAMPP Control Panel → Apache → Config → httpd.conf
#    Ensure these modules are uncommented: proxy, proxy_http
# 2. At the END of httpd.conf, add:
#    Include "D:/Desktop/pantry/pets/docker/xampp-proxy-docker.conf"
#    (use your real project path)
# 3. Restart Apache. Keep Docker running: docker compose up -d

<VirtualHost *:80>
    ServerName localhost
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/
</VirtualHost>
