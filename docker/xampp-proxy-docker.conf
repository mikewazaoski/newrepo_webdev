# XAMPP/WAMP: forward http://localhost/* to the Pet Pantry Docker app on port 8080
# Install with:  scripts\install-xampp-proxy.ps1  (Run as Administrator)

<VirtualHost *:80>
    ServerName localhost
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/
</VirtualHost>
