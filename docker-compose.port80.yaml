# Optional: serve the Docker app on http://localhost (port 80)
# Stop XAMPP/WAMP Apache first — only one service can use port 80.
#
#   docker compose -f docker-compose.yaml -f docker-compose.port80.yaml up -d

services:
  app:
    ports:
      - "80:8080"
      - "8080:8080"
    environment:
      DEFAULT_URI: http://localhost
